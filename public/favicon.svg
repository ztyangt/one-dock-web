<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d6c6f7" />
            <stop offset="100%" stop-color="#b3e8f6" />
        </linearGradient>
        <linearGradient id="gradientBlue" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="100%" stop-color="#3B82F6" />
        </linearGradient>
        <linearGradient id="gradientPurple" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#6366F1" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#312E81" flood-opacity="0.2" />
        </filter>
    </defs>

    <rect width="500" height="500" rx="60" fill="url(#bgGradDark)" />

    <g filter="url(#shadow)">
        <path d="M 126 278 C 126 362 374 362 374 278"
