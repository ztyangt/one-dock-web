              opacity="0.9" />

        <rect x="231.8" y="117" width="36.4" height="161" rx="18.2" fill="url(#gradientBlue)" />

        <circle cx="250" cy="98.8" r="19.6" fill="#60A5FA" />
    </g>

    <text x="250" y="420"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="38"
          font-weight="300"
          fill="#1E293B"
          text-anchor="middle"
          letter-spacing="-0.5">
        One<tspan font-weight="700" fill="#4F46E5">Dock</tspan>
    </text>

    <rect x="235" y="445" width="30" height="3" rx="1.5" fill="#E2E8F0" />
</svg>